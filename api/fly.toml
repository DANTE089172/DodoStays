# Fly.io configuration for DodoStays API
# Deploy: flyctl deploy --remote-only
# Logs: flyctl logs -a dodostays-api

app = "dodostays-api"
primary_region = "sin"  # Singapore — ~150ms latency to Mauritius

[build]
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"

  # Hangfire background jobs
  Hangfire__DashboardEnabled = "true"
  Hangfire__DashboardPath = "/jobs"

  # CORS — allow frontend origins
  Cors__AllowedOrigins__0 = "https://dodostays-web.fly.dev"
  Cors__AllowedOrigins__1 = "https://dodostays.com"
  Cors__AllowedOrigins__2 = "https://www.dodostays.com"

  # Third-party providers (InMemory/Log for MVP, real providers when ready)
  Payments__Provider = "InMemory"
  Payouts__Provider = "InMemory"
  Email__Provider = "Log"
  Sms__Provider = "Log"
  Fx__Provider = "Fixed"
  Kyc__Provider = "InMemory"

  # Photo storage — mounted volume at /data
  PhotoStorage__Provider = "Local"
  PhotoStorage__LocalRoot = "/data/photos"
  PhotoStorage__PublicBaseUrl = "https://dodostays-api.fly.dev/photos"

  # Email/SMS log output — mounted volume at /data
  Email__OutputDir = "/data/emails"
  Sms__OutputDir = "/data/sms"

# IMPORTANT: Invoices are stored at WebRootPath/invoices (hard-coded in LocalDiskInvoicePdfStorage).
# To persist invoices across deploys, we'll symlink /app/wwwroot → /data/wwwroot at container startup.
# For now, invoices write to /app/wwwroot/invoices (ephemeral — survives rolling deploys but not machine replacement).
# TODO: Add a startup command to create symlinks or refactor LocalDiskInvoicePdfStorage to read from config.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0  # Scale to zero when idle (first request after sleep ~3-5s)
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health/live"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Persistent volume for photos/emails/sms (invoices are ephemeral until we refactor or add symlinks)
[mounts]
  source = "dodostays_api_data"
  destination = "/data"
  initial_size = "5gb"

# Secrets (set via flyctl secrets set):
# - ConnectionStrings__Postgres — Postgres connection string from `flyctl postgres attach`
# - Jwt__SigningKey — HMAC signing key (generate with `openssl rand -hex 32`)
# - Jwt__Issuer — "dodostays"
# - Jwt__Audience — "dodostays"
# - Ical__SigningKey — iCal feed signing key (32+ chars)
# - Ical__FeedBaseUrl — "https://dodostays-api.fly.dev"
# - NlParser__AnthropicApiKey — Claude API key (optional, InMemory parser works without it)
