name: Docker Build CI

on:
  push:
    branches:
      - master
    paths:
      - "api/**"
      - "web/**"
      - ".github/workflows/docker-build-ci.yml"
  pull_request:
    branches:
      - master
    paths:
      - "api/**"
      - "web/**"
      - ".github/workflows/docker-build-ci.yml"

jobs:
  docker-build-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          tags: dodostays-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: false
          tags: dodostays-web:ci-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://api:8080
          cache-from: type=gha
          cache-to: type=gha,mode=max
