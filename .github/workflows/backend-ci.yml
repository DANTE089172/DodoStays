name: Backend CI

on:
  push:
    branches:
      - master
    paths:
      - "api/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - master
    paths:
      - "api/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore api/Dodostays.sln

      - name: Build solution
        run: dotnet build api/Dodostays.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test api/tests/Dodostays.Api.Tests/Dodostays.Api.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=unit-test-results.trx"

      - name: Run integration tests
        run: dotnet test api/tests/Dodostays.Api.IntegrationTests/Dodostays.Api.IntegrationTests.csproj --configuration Release --no-build --logger "trx;LogFileName=integration-test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-${{ github.run_id }}
          path: "**/TestResults/*.trx"
